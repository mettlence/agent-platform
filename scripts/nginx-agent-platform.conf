# Example nginx site config for agent-platform.
# Place at /etc/nginx/sites-available/agent-platform, symlink into sites-enabled.
# Replace <your-host> with the actual hostname. Run certbot --nginx after.

server {
    listen 80;
    listen [::]:80;
    server_name <your-host>;

    # HTTP → HTTPS redirect (only after certbot has issued the cert).
    # Comment out until cert is in place to avoid redirect loop.
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;        # agent runs can take a few minutes
    }
}


# nginx site config for agent-platform.
# Installed by scripts/setup-https.sh to /etc/nginx/sites-available/agent-platform.
# Re-run that script after editing.

server {
    listen 80;
    listen [::]:80;
    server_name agent.mettlence.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name agent.mettlence.com;

    ssl_certificate     /etc/letsencrypt/live/agent.mettlence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.mettlence.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;        # agent runs can take a few minutes
    }
}
